
[terminal.shell]
program = "/usr/bin/nu"

[env]
TERM = "xterm-256color"

[window]
opacity = 0.9

[font]
normal.family = "SpaceMono Nerd Font Mono"
bold.family = "SpaceMono Nerd Font Mono"
italic.family = "SpaceMono Nerd Font Mono"
bold_italic.family = "SpaceMono Nerd Font Mono"

size = 16.0

[colors]
primary.background = "#11111b"

[general]
import = [
  "~/.config/alacritty/catppuccin-mocha.toml"
]

[terminal]
